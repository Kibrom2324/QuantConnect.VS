# ─────────────────────────────────────────────────────────────────────────────
# APEX Prometheus Configuration
# infra/prometheus/prometheus.yml
# ─────────────────────────────────────────────────────────────────────────────

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    cluster: apex-trading
    env:     production

# Alert rules
rule_files:
  - /etc/prometheus/alerts.yml
  - /etc/prometheus/model_alerts.yml
  - /etc/prometheus/feedback_alerts.yml

# Alertmanager (optional — wire up when ready)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ["alertmanager:9093"]

# ─── Scrape Configs ───────────────────────────────────────────────────────────

scrape_configs:

  # ── Prometheus self-monitoring ─────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # ── Redis Exporter ─────────────────────────────────────────────────────────
  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement:  redis

  # ── Model Monitor (Phase 07 — apex_model_* metrics) ───────────────────────
  - job_name: model_monitor
    static_configs:
      - targets: ["model-monitor:8020"]
    metrics_path: /metrics
    scrape_interval: 60s

  # ── Signal Provider (apex: signal + portfolio metrics) ────────────────────
  - job_name: signal_provider
    static_configs:
      - targets: ["signal-provider:8000"]
    metrics_path: /metrics
    scrape_interval: 15s

  # ── Risk Engine ───────────────────────────────────────────────────────────
  - job_name: risk_engine
    static_configs:
      - targets: ["risk-engine:8004"]
    metrics_path: /metrics
    scrape_interval: 15s

  # ── Signal Provider Microservice (new FastAPI service with /metrics) ──────
  - job_name: signal_provider_svc
    static_configs:
      - targets: ["signal-provider-svc:8002"]
    metrics_path: /metrics
    scrape_interval: 15s

  # ── TFT Inference Service ─────────────────────────────────────────────────
  - job_name: tft_service
    static_configs:
      - targets: ["tft-service:8005"]
    metrics_path: /metrics
    scrape_interval: 10s    # faster — ML inference metrics

  # ── TimesFM Inference Service ─────────────────────────────────────────────
  - job_name: timesfm-service
    static_configs:
      - targets: ["timesfm-service:8010"]
    metrics_path: /metrics
    scrape_interval: 15s

  # ── Execution Service ─────────────────────────────────────────────────────
  - job_name: execution
    static_configs:
      - targets: ["execution:8003"]
    metrics_path: /metrics
    scrape_interval: 15s

  # ── APEX Dashboard (Next.js — custom app metrics) ─────────────────────────
  - job_name: apex_dashboard
    static_configs:
      - targets: ["apex-dashboard:3001"]
    metrics_path: /api/metrics
    scrape_interval: 30s

  # ── MLflow (via apex-dashboard proxy) ────────────────────────────────────
  # MLflow doesn't expose /metrics; apex-dashboard proxies /health → prom text
  # at /api/mlflow/metrics so up=1 correctly reflects MLflow's actual state.
  - job_name: mlflow
    static_configs:
      - targets: ["apex-dashboard:3001"]
    metrics_path: /api/mlflow/metrics
    scrape_interval: 60s

  # ── Kafka (JMX exporter) — add when kafka-exporter is deployed ────────────
  # - job_name: kafka
  #   static_configs:
  #     - targets: ["kafka-exporter:9308"]

  # ── Node exporter (host metrics) — uncomment when deployed ───────────────
  # - job_name: node
  #   static_configs:
  #     - targets: ["node-exporter:9100"]
