apiVersion: 1

datasources:
  - name:      Prometheus
    type:      prometheus
    access:    proxy
    url:       http://prometheus:9090
    uid:       apex-prometheus
    isDefault: true
    editable:  false
    jsonData:
      httpMethod:       POST
      timeInterval:     "15s"
      prometheusType:   Prometheus
      prometheusVersion: "2.51.0"
