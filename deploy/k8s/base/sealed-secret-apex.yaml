# ─── APEX SealedSecrets — committed placeholder ───────────────────────────────
#
# This file is SAFE TO COMMIT because all encryptedData values are either:
#   (a) real kubeseal-encrypted ciphertext (cluster-specific, useless to attackers), OR
#   (b) the PLACEHOLDER strings below (not real secrets)
#
# IMPORTANT: The PLACEHOLDER values will NOT work. Before deploying to Kubernetes
# you MUST regenerate this file with real encrypted values:
#
#   ./scripts/seal_secret.sh bootstrap     # first time per cluster
#   ./scripts/seal_secret.sh seal-all      # reads .env → writes this file
#   kubectl apply -f deploy/k8s/base/sealed-secret-apex.yaml
#
# Sealed values are CLUSTER-SPECIFIC — regenerate after any cluster re-key or
# when rotating a secret.
#
# See README.md → "Secrets Management" for the full rotation workflow.
# ──────────────────────────────────────────────────────────────────────────────
---
# ─── Alpaca Paper Trading API ─────────────────────────────────────────────────
# Referenced by: execution, data-ingestion (secretKeyRef apex-alpaca-secret)
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: apex-alpaca-secret
  namespace: apex
  annotations:
    sealedsecrets.bitnami.com/namespace-wide: "true"
spec:
  encryptedData:
    # Seal with: ./scripts/seal_secret.sh seal-all
    api_key: PLACEHOLDER__REGENERATE_WITH_seal_secret_sh
    secret_key: PLACEHOLDER__REGENERATE_WITH_seal_secret_sh
  template:
    metadata:
      name: apex-alpaca-secret
      namespace: apex
    type: Opaque

---
# ─── TimescaleDB / PostgreSQL ─────────────────────────────────────────────────
# Referenced by: timescaledb-statefulset (POSTGRES_PASSWORD), all services (TIMESCALE_PASSWORD)
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: apex-db-secret
  namespace: apex
  annotations:
    sealedsecrets.bitnami.com/namespace-wide: "true"
spec:
  encryptedData:
    # Seal with: ./scripts/seal_secret.sh seal-all
    username: PLACEHOLDER__REGENERATE_WITH_seal_secret_sh
    password: PLACEHOLDER__REGENERATE_WITH_seal_secret_sh
  template:
    metadata:
      name: apex-db-secret
      namespace: apex
    type: Opaque

---
# ─── Anthropic + Polygon.io API Keys ─────────────────────────────────────────
# Referenced by: lean-alpha, signal-engine (ANTHROPIC_API_KEY, POLYGON_API_KEY)
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: apex-api-secret
  namespace: apex
  annotations:
    sealedsecrets.bitnami.com/namespace-wide: "true"
spec:
  encryptedData:
    # Seal with: ./scripts/seal_secret.sh seal-all
    anthropic_api_key: PLACEHOLDER__REGENERATE_WITH_seal_secret_sh
    polygon_api_key: PLACEHOLDER__REGENERATE_WITH_seal_secret_sh
  template:
    metadata:
      name: apex-api-secret
      namespace: apex
    type: Opaque

---
# ─── Redis Authentication ─────────────────────────────────────────────────────
# Referenced by: risk-engine, exit-monitor, lean-alpha (REDIS_PASSWORD)
# NOTE: Leave password empty for local dev (Redis runs without auth).
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: apex-redis-secret
  namespace: apex
  annotations:
    sealedsecrets.bitnami.com/namespace-wide: "true"
spec:
  encryptedData:
    # Seal with: ./scripts/seal_secret.sh seal-all
    # Can be empty string for unauthenticated Redis (dev only)
    password: PLACEHOLDER__REGENERATE_WITH_seal_secret_sh
  template:
    metadata:
      name: apex-redis-secret
      namespace: apex
    type: Opaque
