apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: apex

resources:
  - namespace.yaml
  # ── Sealed Secrets (decrypt secrets in cluster) ──────────────────────────
  # Controller must be installed before any SealedSecret resources.
  # First-time setup: ./scripts/seal_secret.sh bootstrap
  - sealed-secrets-controller.yaml
  # SealedSecret manifests (placeholder values — regenerate with seal-all before deploy)
  # Regenerate: ./scripts/seal_secret.sh seal-all
  - sealed-secret-apex.yaml
  # ── Platform resources ───────────────────────────────────────────────────
  - configmap.yaml
  - redis-deployment.yaml
  - kafka-statefulset.yaml
  - timescaledb-statefulset.yaml
  - mlflow-deployment.yaml
  - risk-engine-deployment.yaml
  - signal-engine-deployment.yaml
  - lean-alpha-deployment.yaml
  - execution-deployment.yaml
  - data-ingestion-deployment.yaml
  - feature-engineering-deployment.yaml
  - exit-monitor-deployment.yaml

commonLabels:
  app.kubernetes.io/managed-by: kustomize
  app.kubernetes.io/part-of: apex
