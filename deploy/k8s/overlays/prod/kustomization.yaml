apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# ─── Production overlay ──────────────────────────────────────────────────────
# Replicas: 2 for all services (HA).
# Stricter resource limits to contain runaway memory.
# ALPACA_BASE_URL remains paper by default — override manually via a sealed
# Secret once live trading is approved.

bases:
  - ../../base

namespace: apex

commonLabels:
  environment: prod

patches:
  # Scale all service Deployments to 2 replicas for HA
  - target:
      kind: Deployment
      labelSelector: "app.kubernetes.io/part-of=apex"
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2

  # Production resource limits
  - target:
      kind: Deployment
      labelSelector: "app.kubernetes.io/part-of=apex"
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "200m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1000m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "1Gi"

  # Kafka: 3 replicas in prod
  - target:
      kind: StatefulSet
      name: kafka
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3

configMapGenerator:
  - name: apex-config
    behavior: merge
    literals:
      - ALPACA_BASE_URL=https://paper-api.alpaca.markets
      - LOG_LEVEL=INFO
      - MLFLOW_EXPERIMENT_NAME=apex-walk-forward-prod
